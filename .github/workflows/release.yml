name: Auto Build and Release ZIP

on:
  push:
    branches: [main]  # 每次 push 到 main 时触发

permissions:
  contents: write  # 授予创建 Release 的权限

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取历史以检查现有 tags

      - name: Extract version from code
        id: extract_version
        run: |
          # 假设文件路径是 src/UpdateManager.cs；调整为你的实际路径
          VERSION_FILE="UpdateManager.cs"
          if [ ! -f "$VERSION_FILE" ]; then
            echo "Error: Version file not found!"
            exit 1
          fi
          # 使用 grep 和 sed 提取 CurrentVersion 的值（忽略空格）
          VERSION=$(grep -oP 'public const string CurrentVersion\s*=\s*"\K[^"]+' "$VERSION_FILE")
          if [ -z "$VERSION" ]; then
            echo "Error: Could not extract version!"
            exit 1
          fi
          echo "Extracted version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT  # 更新为新格式

      - name: Check if version changed
        id: check_version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          if [ "v${{ steps.extract_version.outputs.version }}" == "$LATEST_TAG" ]; then
            echo "Version unchanged, skipping release"
            echo "skip=true" >> $GITHUB_OUTPUT  # 更新为新格式
          else
            echo "skip=false" >> $GITHUB_OUTPUT  # 更新为新格式
          fi

      - name: Build ZIP
        if: steps.check_version.outputs.skip != 'true'
        run: |
          PROJECT_NAME=${{ github.event.repository.name }}  # 项目名，如 "my-repo"
          zip -r "${PROJECT_NAME}.zip" . -x ".git/*" ".github/*"  # 压缩；自定义如果需要构建

      - name: Create Release
        if: steps.check_version.outputs.skip != 'true'
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.extract_version.outputs.version }}  # tag 如 v1.6.6
          release_name: Release v${{ steps.extract_version.outputs.version }}  # 标题
          draft: false
          prerelease: false

      - name: Upload ZIP to Release
        if: steps.check_version.outputs.skip != 'true'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./${{ github.event.repository.name }}.zip
          asset_name: ${{ github.event.repository.name }}.zip
          asset_content_type: application/zip